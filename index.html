<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Zakupy Karolinki</title>

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#faf6f0" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zakupy" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <style>
      :root {
        --bg: #faf6f0;
        --card: #ffffff;
        --accent: #e94b5a;
        --accent-press: #c63d49;
        --text: #1b1b1f;
        --text-2: #8a8a93;
        --line: #ece4d8;
        --shadow: 0 1px 2px rgba(27, 27, 31, 0.04), 0 4px 16px rgba(27, 27, 31, 0.05);
        --shadow-press: 0 1px 2px rgba(27, 27, 31, 0.06);
      }
      * { box-sizing: border-box; }
      html { background: var(--bg); height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior-y: none;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        min-height: 100vh;
        min-height: 100dvh;
      }
      input, textarea { -webkit-user-select: text; user-select: text; }

      main { max-width: 28rem; margin: 0 auto; padding: 24px 20px 120px; }

      header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
      .avatar {
        width: 56px; height: 56px; border-radius: 50%;
        background-image: url('/icon-192.png');
        background-size: cover; background-position: center;
        box-shadow: var(--shadow);
        flex-shrink: 0;
      }
      .titles h1 {
        margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
      }
      .titles p { margin: 2px 0 0; font-size: 14px; color: var(--text-2); font-weight: 500; }

      form#new-item { display: flex; gap: 10px; margin-bottom: 22px; }
      input#new-item-input {
        flex: 1;
        height: 50px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        color: var(--text);
        font: inherit;
        font-size: 16px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        box-shadow: var(--shadow);
      }
      input#new-item-input::placeholder { color: var(--text-2); }
      input#new-item-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(233, 75, 90, 0.12); }

      button.add-btn {
        width: 50px; height: 50px;
        flex-shrink: 0;
        border: none;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 8px rgba(233, 75, 90, 0.30);
        transition: transform 0.1s, background 0.15s;
      }
      button.add-btn:active { background: var(--accent-press); transform: scale(0.94); }
      button.add-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; }

      ul#item-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
      li.row {
        display: flex; align-items: center; gap: 12px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
        animation: pop 0.2s ease-out;
      }
      li.row.removing { animation: fade 0.15s ease-in forwards; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
      .row .text { flex: 1; font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .del-btn {
        width: 34px; height: 34px;
        border: none; background: transparent; color: var(--text-2);
        border-radius: 50%; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s, color 0.15s;
      }
      .del-btn:hover, .del-btn:active { background: rgba(233, 75, 90, 0.1); color: var(--accent); }
      .del-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

      #empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-2);
        font-size: 15px;
      }
      #empty .empty-avatar {
        width: 96px; height: 96px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background-image: url('/icon-512.png');
        background-size: cover; background-position: center;
        box-shadow: var(--shadow);
        opacity: 0.85;
      }

      #toast {
        position: fixed; left: 50%; bottom: calc(20px + env(safe-area-inset-bottom));
        transform: translateX(-50%) translateY(100px);
        background: #1b1b1f; color: #fff;
        font-size: 14px; padding: 10px 16px;
        border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        opacity: 0; transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        max-width: calc(100vw - 40px);
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      @keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes fade { to { opacity: 0; transform: translateY(-4px); } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="avatar" aria-hidden="true"></div>
        <div class="titles">
          <h1>Zakupy</h1>
          <p id="summary">&nbsp;</p>
        </div>
      </header>

      <form id="new-item">
        <input
          id="new-item-input"
          type="text"
          inputmode="text"
          enterkeyhint="done"
          placeholder="Co kupic?"
          autocomplete="off"
          autocapitalize="sentences"
        />
        <button type="submit" class="add-btn" aria-label="Dodaj">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </form>

      <ul id="item-list"></ul>

      <div id="empty" hidden>
        <div class="empty-avatar" aria-hidden="true"></div>
        Lista pusta
      </div>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
      const SUPABASE_URL = "https://gldzaglpyyibotexssqn.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZHphZ2xweXlpYm90ZXhzc3FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTE2MzcsImV4cCI6MjA5NDU4NzYzN30.qjE_SKu2kCMMUIqUNf7ku-T_To9xFXvWSA8MTg4j2FY";
      const HEADERS = {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
      };
      const API = `${SUPABASE_URL}/rest/v1/grocery_items`;

      const $list = document.getElementById("item-list");
      const $form = document.getElementById("new-item");
      const $input = document.getElementById("new-item-input");
      const $summary = document.getElementById("summary");
      const $empty = document.getElementById("empty");
      const $toast = document.getElementById("toast");

      const TRASH_SVG = `<svg viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>`;

      let items = [];

      function toast(msg) {
        $toast.textContent = msg;
        $toast.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => $toast.classList.remove("show"), 2200);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);
      }

      function render() {
        $list.innerHTML = "";
        for (const it of items) {
          const li = document.createElement("li");
          li.className = "row";
          li.dataset.id = it.id;
          li.innerHTML = `
            <span class="dot" aria-hidden="true"></span>
            <span class="text">${escapeHtml((it.item || "").trim())}</span>
            <button class="del-btn" aria-label="Usun">${TRASH_SVG}</button>
          `;
          $list.appendChild(li);
        }
        $empty.hidden = items.length > 0;
        $summary.innerHTML = items.length === 0
          ? "&nbsp;"
          : `${items.length} ${items.length === 1 ? "produkt" : items.length < 5 ? "produkty" : "produktow"}`;
      }

      async function loadItems() {
        try {
          const r = await fetch(`${API}?select=*&order=created_at.desc`, { headers: HEADERS });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          items = await r.json();
          render();
        } catch (e) {
          toast("Blad polaczenia z baza");
          console.error(e);
        }
      }

      async function addItem(text) {
        const optimistic = { id: `tmp-${Date.now()}`, item: text };
        items.unshift(optimistic);
        render();
        try {
          const r = await fetch(API, {
            method: "POST",
            headers: { ...HEADERS, Prefer: "return=representation" },
            body: JSON.stringify({ item: text }),
          });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const [saved] = await r.json();
          const i = items.findIndex((it) => it.id === optimistic.id);
          if (i !== -1) items[i] = saved;
          render();
        } catch (e) {
          items = items.filter((it) => it.id !== optimistic.id);
          render();
          toast("Nie udalo sie dodac");
          console.error(e);
        }
      }

      async function deleteItem(id) {
        const prev = items;
        items = items.filter((it) => it.id !== id);
        render();
        try {
          const r = await fetch(`${API}?id=eq.${encodeURIComponent(id)}`, {
            method: "DELETE",
            headers: HEADERS,
          });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
        } catch (e) {
          items = prev;
          render();
          toast("Nie udalo sie usunac");
          console.error(e);
        }
      }

      $form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = $input.value.trim();
        if (!text) return;
        $input.value = "";
        $input.blur();
        addItem(text);
      });

      $list.addEventListener("click", (e) => {
        const btn = e.target.closest(".del-btn");
        if (!btn) return;
        const li = btn.closest("li.row");
        if (!li) return;
        const id = li.dataset.id;
        li.classList.add("removing");
        setTimeout(() => deleteItem(id), 130);
      });

      loadItems();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
